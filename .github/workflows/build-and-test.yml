name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Build (Release)
      run: dotnet build src/GlyphShell/GlyphShell.csproj -c Release

    - name: Test
      run: dotnet test src/GlyphShell.Tests/GlyphShell.Tests.csproj -c Release --verbosity normal
